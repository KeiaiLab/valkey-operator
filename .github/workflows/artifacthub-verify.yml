name: ArtifactHub verify

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      tag:
        description: "이미 publish된 tag (예: v0.4.0). gh-pages 인덱싱/서명 검증 대상."
        required: false
  pull_request:
    paths:
      - 'charts/**'
      - 'hack/artifacthub_*.sh'
      - '.github/workflows/artifacthub-verify.yml'

permissions:
  contents: read

concurrency:
  group: artifacthub-verify-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: ah lint (메타데이터)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - name: Install ah CLI
        run: |
          set -euo pipefail
          AH_VERSION="1.22.0"   # 최신 stable — https://github.com/artifacthub/hub/releases/latest
          curl -fsSL -o /tmp/ah.tar.gz \
            "https://github.com/artifacthub/hub/releases/download/v${AH_VERSION}/ah_${AH_VERSION}_linux_amd64.tar.gz"
          tar -xzf /tmp/ah.tar.gz -C /tmp ah
          sudo install /tmp/ah /usr/local/bin/ah
          ah version
      - name: ah lint
        run: ah lint --kind helm --path charts

  smoke:
    name: ArtifactHub 인덱싱/서명 smoke
    runs-on: ubuntu-latest
    # PR 시점엔 chart가 아직 gh-pages에 publish 전이라 인덱싱 검증이 false-negative → tag/dispatch에서만 실행
    if: github.event_name != 'pull_request'
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: azure/setup-helm@dda3372f752e03dde6b3237bc9431cdc2f7a02a2 # v5
        with:
          version: latest
      - name: Run artifacthub smoke
        env:
          AH_API_KEY_ID: ${{ secrets.AH_API_KEY_ID }}
          AH_API_KEY_SECRET: ${{ secrets.AH_API_KEY_SECRET }}
          TAG: ${{ github.event.inputs.tag || github.ref_name }}
        run: bash hack/artifacthub_smoke.sh
