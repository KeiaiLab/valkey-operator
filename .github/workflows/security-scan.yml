name: Security scan

on:
  schedule:
    - cron: '17 4 * * 1'
  workflow_dispatch: {}
  pull_request:
    paths:
      - 'go.mod'
      - 'go.sum'
      - 'Dockerfile'
      - '.github/workflows/security-scan.yml'

permissions:
  contents: read
  security-events: write

jobs:
  govulncheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      # Install + run binary directly instead of golang/govulncheck-action@v1.
      # The action performs internal `git` operations that hit HTTP 400 on
      # dependabot-triggered PRs (read-only token), failing #146 etc.
      # Binary mode is hermetic and dependabot-context safe.
      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@latest
      - name: Run govulncheck
        run: govulncheck ./...

  trivy-fs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          format: sarif
          output: trivy-fs.sarif
          severity: HIGH,CRITICAL
          exit-code: 0
      - uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: trivy-fs.sarif

  trivy-image:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Build image (no push)
        run: docker build -t valkey-operator:scan .
      - uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: valkey-operator:scan
          format: sarif
          output: trivy-image.sarif
          severity: HIGH,CRITICAL
          exit-code: 0
      - uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: trivy-image.sarif
