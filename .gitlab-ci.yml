# keiailab OSS · GitLab CI (self-contained, RFC-0043 spirit / shadow phase)
# Mirror of the local quality gates: vet -> test -> build.
# allow_failure keeps this non-blocking until a runner + green baseline exist.
stages: [lint, test, build]

default:
  image: golang:1.26

variables:
  GOFLAGS: "-mod=mod"

go-vet:
  stage: lint
  script:
    - go vet ./...
  allow_failure: true

go-test:
  stage: test
  # envtest 통합 테스트(internal/controller, internal/webhook)는 etcd + kube-apiserver
  # 바이너리가 필요 — setup-envtest 로 KUBEBUILDER_ASSETS 주입.
  # (feat/fix-ci-envtest-gate 의 envtest CI 가치를 dev 구조에 맞춰 이식, controller-runtime v0.24)
  script:
    - go install sigs.k8s.io/controller-runtime/tools/setup-envtest@release-0.24
    - export KUBEBUILDER_ASSETS=$($(go env GOPATH)/bin/setup-envtest use 1.35 --bin-dir "${CI_PROJECT_DIR}/.envtest-bin" -p path)
    - go test ./...
  allow_failure: true

go-build:
  stage: build
  script:
    - go build ./...
  allow_failure: true
