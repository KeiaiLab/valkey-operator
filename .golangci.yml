version: "2"
run:
  allow-parallel-runners: true
linters:
  default: none
  enable:
    - copyloopvar
    # depguard 는 valkey internal boundary 도입 후 ADR 와 함께 활성화 (RFC-0017 §3.2).
    # 현재 빈 deny list 는 golangci-lint v2.8 이 거부하므로 비활성.
    - dupl
    - errcheck
    - ginkgolinter
    - goconst
    - gocyclo
    - govet
    - ineffassign
    - lll
    - modernize
    - misspell
    - nakedret
    - prealloc
    - revive
    - staticcheck
    - unconvert
    - unparam
    - unused
    - logcheck
  settings:
    custom:
      logcheck:
        type: "module"
        description: Checks Go logging calls for Kubernetes logging conventions.
    revive:
      rules:
        - name: comment-spacings
        - name: import-shadowing
    modernize:
      disable:
        - omitzero
    # depguard 는 비활성 — valkey internal boundary 도입 시 (ADR 후) 활성화 +
    # deny list 정의. 빈 deny list 는 golangci-lint v2.8 schema 거부.
  exclusions:
    generated: lax
    rules:
      - linters:
          - lll
        path: api/*
      - linters:
          - dupl
          - lll
        path: internal/*
      # 테스트 파일에서는 goconst + unparam + gocyclo 비활성 — fixture 문자열
      # 반복 + 헬퍼 함수 인자 hardcoded + 거대 통합 검증 함수는 정상 패턴.
      - linters:
          - goconst
          - unparam
          - gocyclo
        path: _test\.go$
    paths:
      - third_party$
      - builtin$
      - examples$
formatters:
  enable:
    - gofmt
    - goimports
  exclusions:
    generated: lax
    paths:
      - third_party$
      - builtin$
      - examples$
