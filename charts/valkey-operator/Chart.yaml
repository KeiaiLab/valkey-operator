apiVersion: v2
name: valkey-operator
description: A Kubernetes Operator for managing Valkey instances and Clusters (Redis OSS fork, BSD-licensed)
type: application
version: 1.0.13
appVersion: "1.0.13"
kubeVersion: ">=1.26.0-0"

keywords:
  - valkey
  - redis
  - cache
  - key-value
  - in-memory
  - operator
  - cluster
  - kubernetes

home: https://github.com/keiailab/valkey-operator

sources:
  - https://github.com/keiailab/valkey-operator

maintainers:
  - name: Keiailab
    email: support@keiailab.com
    url: https://keiailab.com

icon: https://valkey.io/img/valkey-horizontal.svg

annotations:
  artifacthub.io/license: Apache-2.0
  artifacthub.io/category: database
  # operatorCapabilities — OperatorHub Phase IV "Deep Insights" (under-claim
  # correction, C-P0-8). User-facing capabilities: Standalone, Replication, and
  # Cluster install (Basic), version upgrade (Seamless), ValkeyBackup/Restore,
  # ValkeyCluster automated bootstrap (Full Lifecycle), and ServiceMonitor,
  # PrometheusRule, and alert-rules.yaml (Deep Insights). Phase V "Auto Pilot"
  # can be claimed only after HPA Replication GA and auto-resharding.
  artifacthub.io/operatorCapabilities: Deep Insights
  artifacthub.io/maturity: stable
  artifacthub.io/links: |
    - name: Documentation
      url: https://github.com/keiailab/valkey-operator/blob/main/README.md
    - name: Source Code
      url: https://github.com/keiailab/valkey-operator
    - name: Valkey Project
      url: https://valkey.io/
  artifacthub.io/crds: |
    - kind: Valkey
      version: v1alpha1
      name: valkeys.cache.keiailab.io
      displayName: Valkey Instance
      description: Deploys and manages a Valkey standalone or replica instance
    - kind: ValkeyCluster
      version: v1alpha1
      name: valkeyclusters.cache.keiailab.io
      displayName: Valkey Cluster
      description: Deploys and manages a Valkey Cluster (Redis Cluster compatible)
    - kind: ValkeyBackup
      version: v1alpha1
      name: valkeybackups.cache.keiailab.io
      displayName: Valkey Backup
      description: Creates point-in-time backups of Valkey instances/clusters
    - kind: ValkeyBackupTarget
      version: v1alpha1
      name: valkeybackuptargets.cache.keiailab.io
      displayName: Valkey Backup Target
      description: Defines S3 / PVC backup destinations
    - kind: ValkeyRestore
      version: v1alpha1
      name: valkeyrestores.cache.keiailab.io
      displayName: Valkey Restore
      description: Restores a Valkey instance/cluster from a backup
  artifacthub.io/crdsExamples: |
    - apiVersion: cache.keiailab.io/v1alpha1
      kind: Valkey
      metadata:
        name: my-valkey
        namespace: cache
      spec:
        mode: Standalone
        replicas: 1
        version:
          version: "9.0.4"
        storage:
          storageClassName: standard
          size: 5Gi
    - apiVersion: cache.keiailab.io/v1alpha1
      kind: ValkeyCluster
      metadata:
        name: my-valkey-cluster
        namespace: cache
      spec:
        version:
          version: "9.0.4"
        shards: 3
        replicasPerShard: 1
        storage:
          storageClassName: standard
          size: 10Gi
    - apiVersion: cache.keiailab.io/v1alpha1
      kind: ValkeyBackup
      metadata:
        name: my-valkey-backup
        namespace: cache
      spec:
        clusterRef:
          name: my-valkey
          kind: Valkey
        type: RDB
        destination:
          type: TargetRef
          targetRef:
            name: s3-target
  artifacthub.io/containsSecurityUpdates: "true"
  artifacthub.io/images: |
    - name: valkey-operator
      image: ghcr.io/keiailab/valkey-operator:1.0.13
    - name: valkey
      image: docker.io/valkey/valkey:9.0.4-alpine3.23
  artifacthub.io/prerelease: "false"
  artifacthub.io/changes: |
    - kind: fixed
      description: Refresh Artifact Hub metadata with the Alpine 3.23 Valkey runtime image and chart release 1.0.12.
  artifacthub.io/recommendations: |
    - url: https://artifacthub.io/packages/helm/prometheus-community/kube-prometheus-stack
    - url: https://artifacthub.io/packages/helm/cert-manager/cert-manager

dependencies: []
