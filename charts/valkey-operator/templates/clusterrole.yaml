{{- if .Values.rbac.create -}}
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "valkey-operator.fullname" . }}
  labels:
    {{- include "valkey-operator.labels" . | nindent 4 }}
rules:
  # Valkey CRDs (cache.keiailab.io/v1alpha1)
  #
  # ADR-0057 Phase A1 (2026-05-07): RBAC conditional 제거.
  # 이전엔 features.cluster.enabled / features.backup.enabled 조건부였으나
  # operator manager (cmd/main.go) 는 항상 모든 controller 등록 → flag=false
  # 시 informer 가 forbidden 으로 startup 실패. RBAC 와 코드 mismatch 가
  # production-grade 차단 요인이었음. RBAC 는 *항상 모든 CRD 권한 부여*,
  # feature flag 는 controller 코드 측에서만 처리.
  - apiGroups:
      - cache.keiailab.io
    resources:
      - valkeys
      - valkeyclusters
      - valkeybackups
      - valkeybackuptargets
      - valkeyrestores
    verbs:
      - create
      - delete
      - get
      - list
      - patch
      - update
      - watch
  - apiGroups:
      - cache.keiailab.io
    resources:
      - valkeys/status
      - valkeyclusters/status
      - valkeybackups/status
      - valkeybackuptargets/status
      - valkeyrestores/status
    verbs:
      - get
      - patch
      - update
  - apiGroups:
      - cache.keiailab.io
    resources:
      - valkeys/finalizers
      - valkeyclusters/finalizers
      - valkeybackups/finalizers
      - valkeybackuptargets/finalizers
      - valkeyrestores/finalizers
    verbs:
      - update

  # Core resources
  - apiGroups:
      - ""
    resources:
      - pods
      - services
      - endpoints
      - persistentvolumeclaims
      - events
      - configmaps
      - secrets
      - serviceaccounts
    verbs:
      - create
      - delete
      - get
      - list
      - patch
      - update
      - watch

  # Apps resources
  - apiGroups:
      - apps
    resources:
      - statefulsets
      {{- if .Values.features.cluster.enabled }}
      - deployments
      - replicasets
      {{- end }}
    verbs:
      - create
      - delete
      - get
      - list
      - patch
      - update
      - watch

  {{- if .Values.features.backup.enabled }}

  # Batch resources (for backup jobs) — gated by features.backup.enabled
  - apiGroups:
      - batch
    resources:
      - jobs
      - cronjobs
    verbs:
      - create
      - delete
      - get
      - list
      - patch
      - update
      - watch
  {{- end }}

  {{- if .Values.features.autoscaling.enabled }}

  # Autoscaling (for HPA) — gated by features.autoscaling.enabled
  - apiGroups:
      - autoscaling
    resources:
      - horizontalpodautoscalers
    verbs:
      - create
      - delete
      - get
      - list
      - patch
      - update
      - watch
  {{- end }}

  # Policy (for PDB)
  - apiGroups:
      - policy
    resources:
      - poddisruptionbudgets
    verbs:
      - create
      - delete
      - get
      - list
      - patch
      - update
      - watch

  # Networking (for NetworkPolicy)
  - apiGroups:
      - networking.k8s.io
    resources:
      - networkpolicies
    verbs:
      - create
      - delete
      - get
      - list
      - patch
      - update
      - watch

  # cert-manager (for TLS)
  - apiGroups:
      - cert-manager.io
    resources:
      - certificates
      - issuers
      - clusterissuers
    verbs:
      - create
      - delete
      - get
      - list
      - patch
      - update
      - watch

  # Prometheus monitoring
  - apiGroups:
      - monitoring.coreos.com
    resources:
      - servicemonitors
      - prometheusrules
    verbs:
      - create
      - delete
      - get
      - list
      - patch
      - update
      - watch

  # Coordination (for leader election)
  - apiGroups:
      - coordination.k8s.io
    resources:
      - leases
    verbs:
      - create
      - delete
      - get
      - list
      - patch
      - update
      - watch
{{- end }}
