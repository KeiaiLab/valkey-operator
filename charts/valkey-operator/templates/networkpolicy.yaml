{{- /*
NetworkPolicy for valkey-operator manager pod (cycle 72).
opt-in via .Values.networkPolicy.enabled. default-deny + 명시 ingress/egress 허용.

기본 ingress (enabled 시):
- Prometheus scrape (metrics 8443) — 같은 namespace 또는 .Values.networkPolicy.ingress 추가.
- Webhook serving (9443) — apiserver 호출 (cycle 73 chart webhook 활성화 + cycle 86 ingress rule + cycle 106 deployment serving config).
- Health probe (8081) — kubelet 자동 (NetworkPolicy 외 — kubelet 호출은 NP 적용 안 됨).

기본 egress:
- API server (443) — 모든 reconciler 의 K8s API 호출.
- Valkey 인스턴스 (6379, 6380 TLS) — operator 가 control-plane (CLUSTER MEET 등).
- DNS (53 UDP/TCP) — Service DNS resolve.
- 사용자 추가 ingress/egress 는 .Values.networkPolicy.{ingress,egress} 로 확장.
*/}}
{{- if .Values.networkPolicy.enabled }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "valkey-operator.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "valkey-operator.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "valkey-operator.selectorLabels" . | nindent 6 }}
  policyTypes:
    - Ingress
    - Egress
  ingress:
    # Prometheus metrics scrape (8443).
    - ports:
        - protocol: TCP
          port: {{ .Values.service.metricsPort | default 8443 }}
    {{- if .Values.webhook.enabled }}
    # cycle 86: Admission webhook (9443) — kube-apiserver 호출. cycles 72/73
    # 결합 시 본 rule 부재 → webhook silent reject. webhook.enabled 분기 동기.
    - ports:
        - protocol: TCP
          port: {{ .Values.webhook.port | default 9443 }}
    {{- end }}
    {{- with .Values.networkPolicy.ingress }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
  egress:
    # K8s API server (443).
    - to:
        - namespaceSelector: {}
      ports:
        - protocol: TCP
          port: 443
    # DNS resolution.
    - to:
        - namespaceSelector: {}
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
    # Valkey instances (6379 + 6380 TLS).
    - ports:
        - protocol: TCP
          port: 6379
        - protocol: TCP
          port: 6380
        - protocol: TCP
          port: 16379  # cluster bus.
    {{- if .Values.tracing.endpoint }}
    # cycle 88: OTLP gRPC egress (default 4317). cycles 65/72 cross-feature
    # — tracing 활성 시 NetworkPolicy 가 collector 호출 차단 → OTEL spans 0
    # 도달 silent. tracing.endpoint 분기 동기.
    - ports:
        - protocol: TCP
          port: 4317  # OTLP gRPC default.
        - protocol: TCP
          port: 4318  # OTLP HTTP default.
    {{- end }}
    {{- if .Values.features.backup.enabled }}
    # cycle 89: ValkeyBackupTarget 의 S3 endpoint Reachable check (외부 AWS S3
    # / cluster-internal MinIO). cycles 16 (BackupTarget) + 72 cross-feature
    # — features.backup.enabled 시 외부 HTTPS (443) egress 필수. 사용자가
    # *internal-only S3* 강제 시 networkPolicy.egress 으로 더 좁게 override.
    - ports:
        - protocol: TCP
          port: 443  # AWS S3 / HTTPS 표준.
        - protocol: TCP
          port: 9000  # MinIO 기본 port (alternative).
    {{- end }}
    {{- with .Values.networkPolicy.egress }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
{{- end }}
