{{- /*
PrometheusRule — 10 alerts (cycle 103). Helm 사용자 도 cycle 25/26 의 alert SSOT
+ runbook §9 자동 활성. config/prometheus/alert-rules.yaml 와 byte-level 동기 —
chart README values 가 .Values.metrics.serviceMonitor.enabled 활성 시만 렌더 (동
일 조건 의 ServiceMonitor 와 함께 등장).

*prometheus-operator CRD 미설치 환경* 에서는 helm install 거절 — 사용자 가
opt-out 시 metrics.serviceMonitor.enabled=false.
*/}}
{{- if and .Values.metrics.enabled .Values.metrics.serviceMonitor.enabled -}}
apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: {{ include "valkey-operator.fullname" . }}-alerts
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "valkey-operator.labels" . | nindent 4 }}
    {{- with .Values.metrics.serviceMonitor.labels }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
spec:
  groups:
    - name: valkey-cluster.rules
      interval: 30s
      rules:
        - alert: ValkeyClusterStateNotOK
          expr: valkey_cluster_state_ok == 0
          for: 5m
          labels:
            severity: critical
            component: valkey-operator
          annotations:
            summary: "ValkeyCluster {{`{{ $labels.namespace }}/{{ $labels.name }}`}} state != ok 5분 지속"
            description: "CLUSTER INFO 의 cluster_state 가 ok 가 아닙니다. slot 분배 또는 quorum 이슈일 가능성. valkey-cli cluster info 로 진단."
            runbook_url: https://github.com/keiailab/valkey-operator/blob/main/docs/operations/runbook.md#91-valkeyclusterstatenotok
        - alert: ValkeyClusterSlotsMismatch
          expr: valkey_cluster_assigned_slots != 16384
          for: 5m
          labels:
            severity: critical
            component: valkey-operator
          annotations:
            summary: "ValkeyCluster {{`{{ $labels.namespace }}/{{ $labels.name }}`}} 슬롯 미스매치 ({{`{{ $value }}`}} != 16384)"
            description: "할당된 hash slot 수가 16384 가 아닙니다. cluster reshard 진행 중이거나 shard 분실 상태."
            runbook_url: https://github.com/keiailab/valkey-operator/blob/main/docs/operations/runbook.md#92-valkeyclusterslotsmismatch
        - alert: ValkeyClusterNoReadyReplicas
          expr: valkey_cluster_ready_replicas == 0
          for: 5m
          labels:
            severity: critical
            component: valkey-operator
          annotations:
            summary: "ValkeyCluster {{`{{ $labels.namespace }}/{{ $labels.name }}`}} 모든 pod NotReady"
            description: "STS 의 readyReplicas=0. PV pending / image pull / liveness probe 실패."
            runbook_url: https://github.com/keiailab/valkey-operator/blob/main/docs/operations/runbook.md#93-valkeyclusternoreadyreplicas
        - alert: ValkeyClusterDegraded
          expr: valkey_cluster_ready_replicas < 2 and valkey_cluster_ready_replicas > 0
          for: 5m
          labels:
            severity: warning
            component: valkey-operator
          annotations:
            summary: "ValkeyCluster {{`{{ $labels.namespace }}/{{ $labels.name }}`}} 일부 pod NotReady"
            description: "일부 pod 만 Ready (ready={{`{{ $value }}`}}). HA 정족수 부족 위험."
            runbook_url: https://github.com/keiailab/valkey-operator/blob/main/docs/operations/runbook.md#94-valkeyclusterdegraded
        - alert: ValkeyClusterPhaseFailed
          expr: valkey_cluster_phase{phase="Failed"} == 1
          for: 1m
          labels:
            severity: critical
            component: valkey-operator
          annotations:
            summary: "ValkeyCluster {{`{{ $labels.namespace }}/{{ $labels.name }}`}} Phase=Failed"
            description: "CR Phase 가 Failed. Status.Conditions 의 Reason/Message 로 원인 분류."
            runbook_url: https://github.com/keiailab/valkey-operator/blob/main/docs/operations/runbook.md#95-valkeyclusterphasefailed
        - alert: ValkeyOperatorReconcileErrorsHigh
          expr: rate(valkey_cluster_reconcile_errors_total[5m]) > 0.1
          for: 5m
          labels:
            severity: warning
            component: valkey-operator
          annotations:
            summary: "valkey-operator reconcile error rate 높음 ({{`{{ $value | humanize }}`}} /sec)"
            description: "{{`{{ $labels.namespace }}/{{ $labels.name }}`}} 의 reconcile 실패 rate 가 0.1/s 초과."
            runbook_url: https://github.com/keiailab/valkey-operator/blob/main/docs/operations/runbook.md#96-valkeyoperatorreconcileerrorshigh
    - name: valkey-operator.rules
      interval: 30s
      rules:
        - alert: ValkeyOperatorDown
          expr: up{job=~"valkey-operator.*"} == 0
          for: 2m
          labels:
            severity: critical
            component: valkey-operator
          annotations:
            summary: "valkey-operator manager 미응답 ({{`{{ $labels.namespace }}/{{ $labels.pod }}`}})"
            description: "metrics endpoint 도달 불가. controller-manager pod 가 down 또는 metrics server 가 listen 안 함."
            runbook_url: https://github.com/keiailab/valkey-operator/blob/main/docs/operations/runbook.md#97-valkeyoperatordown
    - name: valkey-business.rules
      interval: 1m
      rules:
        - alert: ValkeyBackupFailureRateHigh
          expr: rate(valkey_cluster_backup_total{phase="Failed"}[1h]) > 0.0017
          for: 10m
          labels:
            severity: warning
            component: valkey-operator
          annotations:
            summary: "ValkeyBackup 실패율 높음 ({{`{{ $value | humanize }}`}}/sec)"
            description: "{{`{{ $labels.namespace }}/{{ $labels.name }}`}} 의 backup 실패율 가 0.0017/sec (= 0.1/min) 초과 10분 지속."
            runbook_url: https://github.com/keiailab/valkey-operator/blob/main/docs/operations/runbook.md#98-valkeybackupfailureratehigh
        - alert: ValkeyRestoreFailureRateHigh
          expr: rate(valkey_cluster_restore_total{phase="Failed"}[1h]) > 0.0017
          for: 10m
          labels:
            severity: warning
            component: valkey-operator
          annotations:
            summary: "ValkeyRestore 실패율 높음 ({{`{{ $value | humanize }}`}}/sec)"
            description: "{{`{{ $labels.namespace }}/{{ $labels.name }}`}} 의 restore 실패율 가 임계값 초과."
            runbook_url: https://github.com/keiailab/valkey-operator/blob/main/docs/operations/runbook.md#99-valkeyrestorefailureratehigh
        - alert: ValkeyFailoverHigh
          expr: increase(valkey_cluster_failover_total[1h]) >= 2
          for: 1m
          labels:
            severity: warning
            component: valkey-operator
          annotations:
            summary: "ValkeyReplication 자동 failover 빈번 ({{`{{ $value }}`}}회/시간)"
            description: "{{`{{ $labels.namespace }}/{{ $labels.name }}`}} 의 자동 failover 가 1시간 동안 2회 이상. primary 안정성 확인."
            runbook_url: https://github.com/keiailab/valkey-operator/blob/main/docs/operations/runbook.md#910-valkeyfailoverhigh
{{- end }}
