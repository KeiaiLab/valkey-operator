---
# Valkey Operator Helm Chart Values
# This is a YAML-formatted file.

# -- Number of operator replicas
replicaCount: 1

# Operator image configuration
image:
  # -- Image repository
  repository: ghcr.io/keiailab/valkey-operator
  # -- Image pull policy
  pullPolicy: IfNotPresent
  # -- Overrides the image tag (default: chart appVersion)
  tag: ""

# -- Image pull secrets for private registries
imagePullSecrets: []

# -- Override the name of the chart
nameOverride: ""

# -- Override the full name of the chart
fullnameOverride: ""

# ServiceAccount configuration
serviceAccount:
  # -- Specifies whether a service account should be created
  create: true
  # -- Annotations to add to the service account
  annotations: {}
  # -- The name of the service account to use
  name: ""

# -- Additional annotations for the operator deployment
podAnnotations: {}

# -- Additional labels for the operator deployment
podLabels: {}

# Pod security context
podSecurityContext:
  runAsNonRoot: true
  seccompProfile:
    type: RuntimeDefault

# Container security context
securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  runAsNonRoot: true
  capabilities:
    drop:
      - ALL

# Operator service configuration
service:
  # -- Service type
  type: ClusterIP
  # -- Metrics port
  metricsPort: 8443
  # -- Health probe port
  healthPort: 8081

# Resource limits and requests
resources:
  limits:
    cpu: 500m
    memory: 512Mi
  requests:
    cpu: 100m
    memory: 128Mi

# -- Node selector for operator pod scheduling
nodeSelector: {}

# -- Tolerations for operator pod scheduling
tolerations: []

# -- Affinity rules for operator pod scheduling
# cycle 101: supported arch (amd64+arm64) + linux OS 명시 — mixed-arch cluster
# 의 ImagePullBackOff 차단. config/manager/manager.yaml 와 정합. 사용자 가
# 추가 affinity 필요 시 본 값 override.
affinity:
  nodeAffinity:
    requiredDuringSchedulingIgnoredDuringExecution:
      nodeSelectorTerms:
        - matchExpressions:
            - key: kubernetes.io/arch
              operator: In
              values:
                - amd64
                - arm64
            - key: kubernetes.io/os
              operator: In
              values:
                - linux

# -- Topology spread constraints for operator pod scheduling
topologySpreadConstraints: []

# -- Priority class name for operator pod (e.g., system-cluster-critical)
priorityClassName: ""

# -- Runtime class name for operator pod (e.g., gvisor, kata)
runtimeClassName: ""

# -- DNS policy (ClusterFirst, ClusterFirstWithHostNet, Default, None)
dnsPolicy: ""

# -- DNS config — used when dnsPolicy=None or supplemental
dnsConfig: {}

# -- Host aliases — additional /etc/hosts entries
hostAliases: []

# -- Termination grace period seconds (default 10 — operator graceful drain)
terminationGracePeriodSeconds: null

# -- Operator container additional env vars from ConfigMaps (raw EnvFromSource list)
extraEnvVarsCM: []

# -- Operator container additional env vars from Secrets (raw EnvFromSource list)
extraEnvVarsSecret: []

# -- Additional init containers (raw Container list)
extraInitContainers: []

# -- Additional sidecar containers (raw Container list)
sidecars: []

# -- Custom liveness probe (overrides default if non-empty)
customLivenessProbe: {}

# -- Custom readiness probe (overrides default if non-empty)
customReadinessProbe: {}

# -- Custom startup probe
customStartupProbe: {}

# -- Container lifecycle hooks (postStart / preStop)
lifecycleHooks: {}

# Leader election configuration
leaderElection:
  # -- Enable leader election for controller manager
  enabled: true
  # -- Namespace for leader election lease
  namespace: ""

# Metrics configuration
metrics:
  # -- Enable metrics endpoint
  enabled: true
  # -- Enable secure metrics (HTTPS)
  secure: true
  # -- Create ServiceMonitor for Prometheus Operator
  serviceMonitor:
    enabled: true
    # -- ServiceMonitor scrape interval
    interval: 30s
    # -- Additional labels for ServiceMonitor
    labels: {}
    # -- Metric relabeling configs
    metricRelabelings: []
    # -- Relabeling configs
    relabelings: []

# Webhook configuration (cycle 73 implemented).
# enabled=true → 5 K8s 객체 자동 생성: webhook Service + cert-manager Certificate +
# selfSigned Issuer + ValidatingWebhookConfiguration + MutatingWebhookConfiguration.
# *cert-manager 클러스터 차원 사전 설치 필수* (Issuer/Certificate CRD).
webhook:
  # -- Enable admission webhooks (cert-manager 의존). Valkey/ValkeyCluster CR 의
  # admission validation + mutating defaulting (ADR-0009 webhook 정책).
  enabled: false
  # -- Webhook serving 포트 (operator 컨테이너 listen).
  port: 9443

# RBAC configuration
rbac:
  # -- Create RBAC resources
  create: true
  # -- Use ClusterRole (true) or Role (false)
  clusterScope: true

# CRD configuration — NOT YET HOOKED (cycle 70).
# 현재 Helm 3 의 *built-in CRD 동작* (crds/ 디렉토리 = install only, never
# upgrade) 사용. 본 values 는 *future-proofing* — 향후 customizable CRD
# lifecycle (install/keep/upgrade) 도입 시 활용. 현재는 silent — 변경 무효.
crds:
  install: true
  keep: true

# Valkey default configuration (used as defaults for Valkey CRs)
valkey:
  # -- Default Valkey version (Redis OSS fork; AGPL-free baseline).
  # api/v1alpha1 ValkeyVersion default 와 동기 — 변경 시 양쪽 갱신.
  version: "9.0.4"
  # -- Default storage class for persistent volumes
  storageClassName: ""

# Logging configuration
logging:
  # -- Log level (debug, info, error)
  level: info
  # -- Log format (json, console)
  format: json
  # -- Enable development mode logging
  development: false

# Watch configuration (cycle 74 implemented).
# namespaces 빈 list = cluster-wide watch (default). 명시 시 cache.DefaultNamespaces
# 으로 제한 — multi-tenant 또는 RBAC 제한 환경. RBAC 차원 namespaced
# Role/RoleBinding 추가 변환 작업 별개 (현재 chart 는 ClusterRole 만 — 사용자가
# multi-tenant 운영 시 자체 namespaced RBAC 설정 권장).
watch:
  # -- Watch namespaces (빈 list = cluster-wide). e.g., ["valkey-prod", "valkey-stage"]
  namespaces: []

# Health probes configuration
probes:
  liveness:
    # -- Initial delay seconds for liveness probe
    initialDelaySeconds: 15
    # -- Period seconds for liveness probe
    periodSeconds: 20
  readiness:
    # -- Initial delay seconds for readiness probe
    initialDelaySeconds: 5
    # -- Period seconds for readiness probe
    periodSeconds: 10

# -- OpenTelemetry tracing 활성화 (ADR-0025).
# endpoint 미설정 시 no-op tracer (성능 영향 0). serviceName default "valkey-operator".
# 활성화 예: tracing.endpoint: "otel-collector.observability.svc:4317"
tracing:
  # -- OTLP gRPC endpoint (e.g., otel-collector:4317). 비어있으면 OTEL 비활성.
  endpoint: ""
  # -- OTEL service name (Jaeger/Tempo UI 의 service 식별).
  serviceName: "valkey-operator"

# -- Extra environment variables for the operator
extraEnvVars: []
# - name: MY_VAR
#   value: "my-value"

# -- Extra volume mounts for the operator
extraVolumeMounts: []

# -- Extra volumes for the operator
extraVolumes: []

# ----------------------------------------------------------------------------
# Carve-out feature gates (v0.1.0-alpha)
# alpha 출시 범위: Valkey 단일 인스턴스. 다음 기능은 alpha 단계로 기본 비활성화.
# enable=true 로 켤 경우 운영자가 잔여 위험을 인지한 것으로 간주됨.
# ----------------------------------------------------------------------------
features:
  # ValkeyCluster — 분산 클러스터 (Redis Cluster 호환 모드). alpha 안정화 진행 중.
  cluster:
    enabled: false
  # ValkeyBackup + ValkeyBackupTarget + ValkeyRestore — S3/GCS/Azure/PVC/VolumeSnapshot.
  # 27 PR commercial parity series (PR #38-#64) 후 *production-ready*.
  # type 옵션: RDB / AOF / VolumeSnapshot (PR #51 + #57 lifecycle).
  # destination: PVC (default) 또는 TargetRef (외부 ValkeyBackupTarget).
  backup:
    enabled: false
  # Auto-scaling (HPA) — ADR-0027 구현 완료 (PR #44, 2026-05-10).
  # features.autoscaling.enabled=true 시:
  #   - RBAC 부여 (autoscaling/horizontalpodautoscalers)
  #   - operator 가 ValkeySpec.Autoscaling.Enabled=true 인 CR 의 HPA CR 자동 생성/관리
  # CR-level 옵션: Spec.Autoscaling.{MinReplicas, MaxReplicas,
  # TargetCPUUtilizationPercentage, TargetMemoryUtilizationPercentage}.
  # 제약: Replication mode 만 (Cluster mode 는 slot 재분배 위험으로 별도 epic).
  autoscaling:
    enabled: false

# NetworkPolicy for operator pod (cycle 72 implemented).
# default-deny 기반 + 명시 ingress (Prometheus 8443) + egress (K8s API 443, DNS 53,
# Valkey 6379/6380/16379). 추가 rule 은 networkPolicy.ingress / egress 로 확장.
networkPolicy:
  # -- Enable NetworkPolicy for operator pod (default-deny + 명시 허용 rules).
  enabled: false
  # -- Additional ingress rules (NetworkPolicyIngressRule[]).
  ingress: []
  # -- Additional egress rules (NetworkPolicyEgressRule[]).
  egress: []

# Pod Disruption Budget configuration
podDisruptionBudget:
  # -- Enable PodDisruptionBudget
  enabled: false
  # -- Minimum available pods
  minAvailable: 1
  # -- Maximum unavailable pods
  maxUnavailable: ""

# Priority class configuration
priorityClassName: ""

# Topology spread constraints
topologySpreadConstraints: []
