---
# Valkey Operator Helm Chart Values
# This is a YAML-formatted file.

# -- Number of operator replicas
replicaCount: 1

# Operator image configuration
image:
  # -- Image repository
  repository: ghcr.io/keiailab/valkey-operator
  # -- Image pull policy
  pullPolicy: IfNotPresent
  # -- Overrides the image tag (default: chart appVersion)
  tag: ""

# -- Image pull secrets for private registries
imagePullSecrets: []

# -- Override the name of the chart
nameOverride: ""

# -- Override the full name of the chart
fullnameOverride: ""

# ServiceAccount configuration
serviceAccount:
  # -- Specifies whether a service account should be created
  create: true
  # -- Annotations to add to the service account
  annotations: {}
  # -- The name of the service account to use
  name: ""

# -- Additional annotations for the operator deployment
podAnnotations: {}

# -- Additional labels for the operator deployment
podLabels: {}

# Pod security context
podSecurityContext:
  runAsNonRoot: true
  seccompProfile:
    type: RuntimeDefault

# Container security context
securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  runAsNonRoot: true
  capabilities:
    drop:
      - ALL

# Operator service configuration
service:
  # -- Service type
  type: ClusterIP
  # -- Metrics port
  metricsPort: 8443
  # -- Health probe port
  healthPort: 8081

# Resource limits and requests
resources:
  limits:
    cpu: 500m
    memory: 512Mi
  requests:
    cpu: 100m
    memory: 128Mi

# -- Node selector for operator pod scheduling
nodeSelector: {}

# -- Tolerations for operator pod scheduling
tolerations: []

# -- Affinity rules for operator pod scheduling
affinity: {}

# Leader election configuration
leaderElection:
  # -- Enable leader election for controller manager
  enabled: true
  # -- Namespace for leader election lease
  namespace: ""

# Metrics configuration
metrics:
  # -- Enable metrics endpoint
  enabled: true
  # -- Enable secure metrics (HTTPS)
  secure: true
  # -- Create ServiceMonitor for Prometheus Operator
  serviceMonitor:
    enabled: true
    # -- ServiceMonitor scrape interval
    interval: 30s
    # -- Additional labels for ServiceMonitor
    labels: {}
    # -- Metric relabeling configs
    metricRelabelings: []
    # -- Relabeling configs
    relabelings: []

# Webhook configuration — NOT YET IMPLEMENTED (cycle 70 정직 표시).
# 본 chart 는 admission webhook (ValidatingWebhookConfiguration + Mutating-,
# webhook Service + Certificate) templates 미보유 — Helm 사용자는 *webhook 미적용
# 상태로 운영*. webhook 필요 시 *kustomize* 사용 (config/webhook/ + config/
# certmanager/ 활용). 향후 cycle 에서 chart 측 webhook templates 추가 예정.
webhook:
  enabled: false
  port: 9443

# RBAC configuration
rbac:
  # -- Create RBAC resources
  create: true
  # -- Use ClusterRole (true) or Role (false)
  clusterScope: true

# CRD configuration — NOT YET HOOKED (cycle 70).
# 현재 Helm 3 의 *built-in CRD 동작* (crds/ 디렉토리 = install only, never
# upgrade) 사용. 본 values 는 *future-proofing* — 향후 customizable CRD
# lifecycle (install/keep/upgrade) 도입 시 활용. 현재는 silent — 변경 무효.
crds:
  install: true
  keep: true

# Valkey default configuration (used as defaults for Valkey CRs)
valkey:
  # -- Default Valkey version (Redis OSS fork; AGPL-free baseline).
  # api/v1alpha1 ValkeyVersion default 와 동기 — 변경 시 양쪽 갱신.
  version: "8.1.6"
  # -- Default storage class for persistent volumes
  storageClassName: ""

# Logging configuration
logging:
  # -- Log level (debug, info, error)
  level: info
  # -- Log format (json, console)
  format: json
  # -- Enable development mode logging
  development: false

# Watch configuration — NOT YET IMPLEMENTED (cycle 70).
# 현재 operator 는 *cluster-wide* watch (모든 namespace). namespace 제한 mode
# 는 controller-runtime manager.Cache 의 DefaultNamespaces 옵션 + RBAC namespaced
# Role/RoleBinding 도 필요 — 본 chart 미구현. 향후 cycle 에서 활성화.
watch:
  namespaces: []

# Health probes configuration
probes:
  liveness:
    # -- Initial delay seconds for liveness probe
    initialDelaySeconds: 15
    # -- Period seconds for liveness probe
    periodSeconds: 20
  readiness:
    # -- Initial delay seconds for readiness probe
    initialDelaySeconds: 5
    # -- Period seconds for readiness probe
    periodSeconds: 10

# -- OpenTelemetry tracing 활성화 (ADR-0025).
# endpoint 미설정 시 no-op tracer (성능 영향 0). serviceName default "valkey-operator".
# 활성화 예: tracing.endpoint: "otel-collector.observability.svc:4317"
tracing:
  # -- OTLP gRPC endpoint (e.g., otel-collector:4317). 비어있으면 OTEL 비활성.
  endpoint: ""
  # -- OTEL service name (Jaeger/Tempo UI 의 service 식별).
  serviceName: "valkey-operator"

# -- Extra environment variables for the operator
extraEnvVars: []
# - name: MY_VAR
#   value: "my-value"

# -- Extra volume mounts for the operator
extraVolumeMounts: []

# -- Extra volumes for the operator
extraVolumes: []

# ----------------------------------------------------------------------------
# Carve-out feature gates (v0.1.0-alpha)
# alpha 출시 범위: Valkey 단일 인스턴스. 다음 기능은 alpha 단계로 기본 비활성화.
# enable=true 로 켤 경우 운영자가 잔여 위험을 인지한 것으로 간주됨.
# ----------------------------------------------------------------------------
features:
  # ValkeyCluster — 분산 클러스터 (Redis Cluster 호환 모드). alpha 안정화 진행 중.
  cluster:
    enabled: false
  # ValkeyBackup + ValkeyBackupTarget + ValkeyRestore — S3/PVC 대상 백업/복원. alpha.
  backup:
    enabled: false
  # Auto-scaling (HPA) — alpha 단계, drift-guard mutex 검증 미완료.
  autoscaling:
    enabled: false

# Network Policy configuration — NOT YET IMPLEMENTED (cycle 70).
# 본 chart 는 NetworkPolicy template 미보유 — Helm 사용자는 NetworkPolicy
# 미적용. CR-level (Valkey/ValkeyCluster.Spec.NetworkPolicy) 의 NetworkPolicy
# (config/samples 참조) 는 정상 작동 — operator 가 직접 생성. 본 *operator
# 자체* 의 NetworkPolicy (manager pod) 만 chart 미구현.
networkPolicy:
  enabled: false
  ingress: []
  egress: []

# Pod Disruption Budget configuration
podDisruptionBudget:
  # -- Enable PodDisruptionBudget
  enabled: false
  # -- Minimum available pods
  minAvailable: 1
  # -- Maximum unavailable pods
  maxUnavailable: ""

# Priority class configuration
priorityClassName: ""

# Topology spread constraints
topologySpreadConstraints: []
