apiVersion: v1
kind: Namespace
metadata:
  labels:
    control-plane: controller-manager
    app.kubernetes.io/name: valkey-operator
    app.kubernetes.io/managed-by: kustomize
  name: system
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: controller-manager
  namespace: system
  labels:
    control-plane: controller-manager
    app.kubernetes.io/name: valkey-operator
    app.kubernetes.io/managed-by: kustomize
spec:
  selector:
    matchLabels:
      control-plane: controller-manager
      app.kubernetes.io/name: valkey-operator
  replicas: 1
  template:
    metadata:
      annotations:
        kubectl.kubernetes.io/default-container: manager
      labels:
        control-plane: controller-manager
        app.kubernetes.io/name: valkey-operator
    spec:
      # cycle 101: 우리 image (docker-buildx --platform=linux/amd64,linux/arm64)
      # 의 supported arch + linux OS 만 schedule. Mixed-arch cluster (예: ARM
      # control plane + AMD64 nodes) 에서 incompatible node 로 schedule 시
      # ImagePullBackOff 차단. ppc64le/s390x 는 미지원 — image 미빌드.
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: kubernetes.io/arch
                    operator: In
                    values:
                      - amd64
                      - arm64
                  - key: kubernetes.io/os
                    operator: In
                    values:
                      - linux
      securityContext:
        # Projects are configured by default to adhere to the "restricted" Pod Security Standards.
        # This ensures that deployments meet the highest security requirements for Kubernetes.
        # For more details, see: https://kubernetes.io/docs/concepts/security/pod-security-standards/#restricted
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
      - command:
        - /manager
        args:
          - --leader-elect
          - --health-probe-bind-address=:8081
        image: controller:latest
        name: manager
        # cycle 64: Upload/Download Job 의 image 결정 — operatorImage() 가 본 env
        # 우선, 미설정 시 "controller:latest" fallback (production 에서 미존재
        # → ImagePullBackOff). kustomize image transformer 가 OPERATOR_IMAGE
        # value 도 자동 갱신하도록 config/default/manager_metrics_patch 등에서
        # patch 또는 사용자가 release 시 sed 처리. 본 placeholder ↔ image: 필드
        # 일치 강제 (cycle 64 게이트).
        env:
        - name: OPERATOR_IMAGE
          value: controller:latest
        ports:
        - containerPort: 8081
          name: health
          protocol: TCP
        securityContext:
          readOnlyRootFilesystem: true
          allowPrivilegeEscalation: false
          capabilities:
            drop:
            - "ALL"
        livenessProbe:
          httpGet:
            path: /healthz
            port: 8081
          initialDelaySeconds: 15
          periodSeconds: 20
        readinessProbe:
          httpGet:
            path: /readyz
            port: 8081
          initialDelaySeconds: 5
          periodSeconds: 10
        # cycle 61: kubebuilder default (10m/64Mi req, 128Mi limit) 은 production
        # 현실 부족 — controller-runtime 캐시 + 다중 CR reconcile 시 128Mi OOM
        # 위험. chart values.yaml + 3-repo (mongodb/postgres-operator) 와 정합.
        # 운영자가 메트릭 (process_resident_memory_bytes) 모니터링 후 조정 가능.
        resources:
          limits:
            cpu: 500m
            memory: 512Mi
          requests:
            cpu: 100m
            memory: 128Mi
        volumeMounts: []
      volumes: []
      serviceAccountName: controller-manager
      terminationGracePeriodSeconds: 10
