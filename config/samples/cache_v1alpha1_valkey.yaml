apiVersion: cache.keiailab.io/v1alpha1
kind: Valkey
metadata:
  labels:
    app.kubernetes.io/name: valkey-operator
    app.kubernetes.io/managed-by: kustomize
  name: valkey-sample
spec:
  # Standalone (단일 인스턴스). Replication 은 mode=Replication + replicas>=2.
  mode: Standalone
  replicas: 1
  version:
    image: docker.io/valkey/valkey
    version: "9.0.4"
    # imageRef: docker.io/valkey/valkey:9.0.4-alpine3.23@sha256:<digest>  # digest 고정 운영 시 image/version 보다 우선
  revisionHistoryLimit: 10
  service:
    type: ClusterIP                         # LoadBalancer/NodePort 필요 시 변경
    # annotations:
    #   service.beta.kubernetes.io/aws-load-balancer-type: nlb
    # ipFamilyPolicy: PreferDualStack
    # ipFamilies: [IPv4, IPv6]
  storage:
    size: 8Gi
    # storageClassName: standard           # 클러스터의 기본 SC 사용 시 생략 가능
    # accessModes: [ReadWriteOnce]
    # existingClaim: valkey-data            # 사전 생성 PVC 사용 시
    # ephemeral: true                       # dev/test 전용 emptyDir. 운영 데이터 보존 필요 시 금지
    # encryptionRequired: true             # PR #45 — SC 가 encryption 미표시 시 Warning event
    # encryptionEnforce: true              # PR #55 — encryptionRequired + 본 필드 시 reconcile reject (compliance)
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 1Gi
  auth:
    enabled: true                          # ADR-0013 — 사실상 항상 enabled
    # passwordSecretRef:                   # 기존 Secret 사용 시
    #   name: valkey-password
    #   key: password
  # tls:                                   # cert-manager 사용 시 활성화
  #   enabled: true
  #   certManager:
  #     issuerRef:                         # 외부 Issuer 사용 시 (Let's Encrypt 등)
  #       kind: ClusterIssuer
  #       name: ca-issuer
  #     # autoSelfSigned: true             # PR #40 — operator 가 SelfSigned Issuer 자동 생성
  #                                        # (외부 chart 의 tls.autoGenerated 패턴 동급)
  # podDisruptionBudget:                   # PR #49 — replicas>=2 시 자동 생성 (default-on, opt-out 가능)
  #   enabled: false                       # 명시적 opt-out
  # pod:
  #   labels:
  #     workload-tier: cache
  #   annotations:
  #     backup.velero.io/backup-volumes: data
  #   imagePullSecrets:
  #     - name: private-registry
  #   hostAliases:
  #     - ip: "10.0.0.10"
  #       hostnames: ["legacy-redis.local"]
  #   extraEnv:
  #     - name: VALKEY_LOG_FORMAT
  #       value: json
  #   startupProbe:
  #     exec:
  #       command: ["sh", "-c", "valkey-cli -h 127.0.0.1 -p 6379 ping | grep -q PONG"]
  #     periodSeconds: 5
  #     failureThreshold: 30
  monitoring:
    enabled: true                          # Prometheus Operator 사용 시 ServiceMonitor 자동 생성
    # serviceMonitor 하위 필드는 Labels / Interval / Namespace 만 (enabled 없음 — Monitoring.Enabled 가 단일 switch)
  # autoscaling:                           # PR #44 — Replication mode 만 지원 (ADR-0027)
  #   enabled: true
  #   minReplicas: 2
  #   maxReplicas: 10
  #   targetCPUUtilizationPercentage: 70
  #   targetMemoryUtilizationPercentage: 80
  # slowLog:                               # PR #45 — slowlog-log-slower-than directive 자동 주입
  #   thresholdMicros: 5000                # 5ms 보다 오래 걸린 명령 기록 (default 10ms)
  #   maxEntries: 256                      # FIFO 보존 entry 수
  # externalReplica:                       # 외부 Redis/Valkey primary 에서 단방향 복제
  #   enabled: true
  #   host: redis-master.example.com
  #   port: 6379
  #   auth:
  #     enabled: true
  #     passwordSecretRef:
  #       name: external-redis-password
  #       key: password
