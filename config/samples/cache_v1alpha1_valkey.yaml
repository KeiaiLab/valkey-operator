apiVersion: cache.keiailab.io/v1alpha1
kind: Valkey
metadata:
  labels:
    app.kubernetes.io/name: valkey-operator
    app.kubernetes.io/managed-by: kustomize
  name: valkey-sample
spec:
  # Standalone (단일 인스턴스). Replication 은 mode=Replication + replicas>=2.
  mode: Standalone
  replicas: 1
  version:
    image: docker.io/valkey/valkey
    version: "9.0.4"
  storage:
    size: 8Gi
    # storageClassName: standard           # 클러스터의 기본 SC 사용 시 생략 가능
    # encryptionRequired: true             # PR #45 — SC 가 encryption 미표시 시 Warning event
    # encryptionEnforce: true              # PR #55 — encryptionRequired + 본 필드 시 reconcile reject (compliance)
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 1Gi
  auth:
    enabled: true                          # ADR-0013 — 사실상 항상 enabled
  # tls:                                   # cert-manager 사용 시 활성화
  #   enabled: true
  #   certManager:
  #     issuerRef:                         # 외부 Issuer 사용 시 (Let's Encrypt 등)
  #       kind: ClusterIssuer
  #       name: ca-issuer
  #     # autoSelfSigned: true             # PR #40 — operator 가 SelfSigned Issuer 자동 생성
  #                                        # (Bitnami chart 의 tls.autoGenerated 동급)
  # podDisruptionBudget:                   # PR #49 — replicas>=2 시 자동 생성 (default-on, opt-out 가능)
  #   enabled: false                       # 명시적 opt-out
  monitoring:
    enabled: true                          # Prometheus Operator 사용 시 ServiceMonitor 자동 생성
    # serviceMonitor 하위 필드는 Labels / Interval / Namespace 만 (enabled 없음 — Monitoring.Enabled 가 단일 switch)
  # autoscaling:                           # PR #44 — Replication mode 만 지원 (ADR-0027)
  #   enabled: true
  #   minReplicas: 2
  #   maxReplicas: 10
  #   targetCPUUtilizationPercentage: 70
  #   targetMemoryUtilizationPercentage: 80
  # slowLog:                               # PR #45 — slowlog-log-slower-than directive 자동 주입
  #   thresholdMicros: 5000                # 5ms 보다 오래 걸린 명령 기록 (default 10ms)
  #   maxEntries: 256                      # FIFO 보존 entry 수
