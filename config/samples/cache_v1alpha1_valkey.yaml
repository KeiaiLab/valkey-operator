apiVersion: cache.keiailab.io/v1alpha1
kind: Valkey
metadata:
  labels:
    app.kubernetes.io/name: valkey-operator
    app.kubernetes.io/managed-by: kustomize
  name: valkey-sample
spec:
  # Standalone (단일 인스턴스). Replication 은 mode=Replication + replicas>=2.
  mode: Standalone
  replicas: 1
  version:
    image: docker.io/valkey/valkey
    version: "9.0.4"
  storage:
    size: 8Gi
    # storageClassName: standard           # 클러스터의 기본 SC 사용 시 생략 가능
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 1Gi
  auth:
    enabled: true                          # ADR-0013 — 사실상 항상 enabled
  # tls:                                   # cert-manager 사용 시 활성화
  #   enabled: true
  #   certManager:
  #     issuerRef:
  #       kind: ClusterIssuer
  #       name: ca-issuer
  podDisruptionBudget:
    enabled: true                          # 운영 환경 권장
  monitoring:
    enabled: true                          # Prometheus Operator 사용 시 ServiceMonitor 자동 생성
    # serviceMonitor 하위 필드는 Labels / Interval / Namespace 만 (enabled 없음 — Monitoring.Enabled 가 단일 switch)
