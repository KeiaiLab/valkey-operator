apiVersion: cache.keiailab.io/v1alpha1
kind: ValkeyCluster
metadata:
  labels:
    app.kubernetes.io/name: valkey-operator
    app.kubernetes.io/managed-by: kustomize
  name: valkeycluster-sample
spec:
  # Sharded Cluster (16384 슬롯 자동 분배). 최소 3 shards 권장.
  shards: 3
  replicasPerShard: 1                      # shard 당 1 primary + 1 replica = 6 노드
  version:
    image: docker.io/valkey/valkey
    version: "9.0.4"
    # imageRef: docker.io/valkey/valkey:9.0.4@sha256:<digest>
  revisionHistoryLimit: 10
  service:
    type: ClusterIP
    # ipFamilyPolicy: PreferDualStack
    # ipFamilies: [IPv4, IPv6]
  storage:
    size: 8Gi
    # accessModes: [ReadWriteOnce]
    # existingClaim: valkey-cluster-data    # 단일 PVC 재사용은 shard별 분리 요구와 충돌할 수 있으므로 주의
    # encryptionRequired: true             # PR #45 — SC 가 encryption 미표시 시 Warning event
    # encryptionEnforce: true              # PR #55 — encryptionRequired + 본 필드 시 reconcile reject
  resources:
    requests:
      cpu: 200m
      memory: 512Mi
    limits:
      cpu: 1
      memory: 2Gi
  auth:
    enabled: true                          # ADR-0013
  # tls:                                   # cert-manager 사용 시 활성화
  #   enabled: true
  #   certManager:
  #     issuerRef:                         # 외부 Issuer 명시 또는
  #       kind: ClusterIssuer
  #       name: ca-issuer
  #     # autoSelfSigned: true             # PR #40 — operator 가 SelfSigned Issuer 자동 생성
  autoFailover: true                       # primary 장애 시 자동 promote (ADR-0017)
  # podDisruptionBudget:                   # PR #49 — replicas>=2 시 자동 생성 (default-on)
  #   enabled: false                       # 명시적 opt-out
  # pod:
  #   labels:
  #     workload-tier: cache
  #   annotations:
  #     backup.velero.io/backup-volumes: data
  #   imagePullSecrets:
  #     - name: private-registry
  #   extraEnv:
  #     - name: VALKEY_LOG_FORMAT
  #       value: json
  monitoring:
    enabled: true
  # slowLog:                               # PR #45 — slowlog-log-slower-than directive 주입
  #   thresholdMicros: 5000                # 5ms 보다 오래 걸린 명령 기록
  #   maxEntries: 256
