apiVersion: v1
entries:
  valkey-operator:
  - annotations:
      artifacthub.io/category: database
      artifacthub.io/changes: |
        - kind: added
          description: Initial alpha release. Valkey + ValkeyCluster + ValkeyBackup + ValkeyBackupTarget + ValkeyRestore CRDs (cache.keiailab.io/v1alpha1).
        - kind: added
          description: Standalone / replica mode for Valkey instances with persistent storage and TLS support.
        - kind: added
          description: Cluster mode (Redis Cluster compatible) — opt-in via features.cluster.enabled.
        - kind: added
          description: Backup/restore controllers (S3, PVC targets) — opt-in via features.backup.enabled.
        - kind: added
          description: Optional HPA via features.autoscaling.enabled, PodDisruptionBudget, and NetworkPolicy automation.
        - kind: added
          description: ServiceMonitor + Prometheus rules templates for cluster-native metrics.
      artifacthub.io/containsSecurityUpdates: "false"
      artifacthub.io/crds: |
        - kind: Valkey
          version: v1alpha1
          name: valkeys.cache.keiailab.io
          displayName: Valkey Instance
          description: Deploys and manages a Valkey standalone or replica instance
        - kind: ValkeyCluster
          version: v1alpha1
          name: valkeyclusters.cache.keiailab.io
          displayName: Valkey Cluster
          description: Deploys and manages a Valkey Cluster (Redis Cluster compatible)
        - kind: ValkeyBackup
          version: v1alpha1
          name: valkeybackups.cache.keiailab.io
          displayName: Valkey Backup
          description: Creates point-in-time backups of Valkey instances/clusters
        - kind: ValkeyBackupTarget
          version: v1alpha1
          name: valkeybackuptargets.cache.keiailab.io
          displayName: Valkey Backup Target
          description: Defines S3 / PVC backup destinations
        - kind: ValkeyRestore
          version: v1alpha1
          name: valkeyrestores.cache.keiailab.io
          displayName: Valkey Restore
          description: Restores a Valkey instance/cluster from a backup
      artifacthub.io/crdsExamples: |
        - apiVersion: cache.keiailab.io/v1alpha1
          kind: Valkey
          metadata:
            name: my-valkey
            namespace: cache
          spec:
            mode: Standalone
            replicas: 1
            version:
              version: "9.0.4"
            storage:
              storageClassName: standard
              size: 5Gi
        - apiVersion: cache.keiailab.io/v1alpha1
          kind: ValkeyCluster
          metadata:
            name: my-valkey-cluster
            namespace: cache
          spec:
            version:
              version: "9.0.4"
            shards: 3
            replicasPerShard: 1
            storage:
              storageClassName: standard
              size: 10Gi
        - apiVersion: cache.keiailab.io/v1alpha1
          kind: ValkeyBackup
          metadata:
            name: my-valkey-backup
            namespace: cache
          spec:
            clusterRef:
              name: my-valkey
              kind: Valkey
            type: RDB
            destination:
              type: TargetRef
              targetRef:
                name: s3-target
      artifacthub.io/images: |
        - name: valkey-operator
          image: ghcr.io/keiailab/valkey-operator:0.1.0-alpha.3
        - name: valkey
          image: docker.io/valkey/valkey:9.0.4
      artifacthub.io/license: Apache-2.0
      artifacthub.io/links: |
        - name: Documentation
          url: https://github.com/keiailab/valkey-operator/blob/main/README.md
        - name: Source Code
          url: https://github.com/keiailab/valkey-operator
        - name: Valkey Project
          url: https://valkey.io/
      artifacthub.io/maturity: alpha
      artifacthub.io/operatorCapabilities: Basic Install
      artifacthub.io/prerelease: "true"
      artifacthub.io/recommendations: |
        - url: https://artifacthub.io/packages/helm/prometheus-community/kube-prometheus-stack
        - url: https://artifacthub.io/packages/helm/cert-manager/cert-manager
